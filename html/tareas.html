<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskMate - Tasks</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed": "#c9e6ff",
              "surface-dim": "#cfdaf2",
              "on-surface-variant": "#464555",
              "on-secondary-fixed-variant": "#444749",
              "tertiary-container": "#006693",
              "primary-fixed-dim": "#c3c0ff",
              "secondary-fixed": "#e0e3e5",
              "on-primary-fixed-variant": "#3323cc",
              "on-secondary-fixed": "#191c1e",
              "on-secondary-container": "#626567",
              "inverse-primary": "#c3c0ff",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#b8e0ff",
              "primary": "#3525cd",
              "on-error-container": "#93000a",
              "surface-bright": "#f9f9ff",
              "surface-container-high": "#dee8ff",
              "tertiary-fixed-dim": "#89ceff",
              "secondary-fixed-dim": "#c4c7c9",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "surface-tint": "#4d44e3",
              "on-surface": "#111c2d",
              "error": "#ba1a1a",
              "secondary": "#5c5f61",
              "tertiary": "#004d70",
              "on-background": "#111c2d",
              "on-primary": "#ffffff",
              "outline": "#777587",
              "surface-variant": "#d8e3fb",
              "outline-variant": "#c7c4d8",
              "surface": "#f9f9ff",
              "on-error": "#ffffff",
              "surface-container-highest": "#d8e3fb",
              "inverse-surface": "#263143",
              "primary-container": "#4f46e5",
              "primary-fixed": "#e2dfff",
              "background": "#f9f9ff",
              "secondary-container": "#e0e3e5",
              "on-primary-fixed": "#0f0069",
              "on-tertiary-fixed": "#001e2f",
              "surface-container": "#e7eeff",
              "surface-container-low": "#f0f3ff",
              "on-primary-container": "#dad7ff",
              "inverse-on-surface": "#ecf1ff",
              "on-tertiary-fixed-variant": "#004c6e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#f9f9ff] dark:bg-slate-950 docked full-width top-0 z-40 sticky">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high flex items-center justify-center">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="professional portrait of a young male student in a minimal studio setting with soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC29nSYUsXTEJslhOpY0zdn1mTTwgfs7j4BGnKzylDTPP2NYaJzAKPQWHZ2unPYYZVB9uRzRr9Z-_7FQ-c7ukAPSgLXYt9zFtC0w8twlS-TXVvwrcAmLJjgXPvO3S6-Byw0l0bMGK9D2r8wyLJQ_-em9FtMQBU8I7eDjNCiVAFYURvCnacjDLxapEGm3Y7h3fIIlb753629JJbhOhVv022hM09BZDYxFMXbodGl5SiYvucctiPu-AI5R12FH0eVtk8g5rHUTuAd7cMb"/>
</div>
<span class="text-xl font-extrabold text-[#3525cd] dark:text-[#4f46e5] font-['Manrope']">TaskMate</span>
</div>
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-200">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="search">search</span>
</button>
</div>
</header>
<main class="max-w-7xl mx-auto px-6 pt-4">
<!-- Search & Filters -->
<div class="space-y-6">
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-12 focus:ring-2 focus:ring-primary/20 transition-all font-body text-on-surface placeholder:text-outline" placeholder="Buscar tareas..." type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<button class="text-primary p-1">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
</button>
</div>
</div>
<!-- Filter Chips -->
<div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
<button class="flex items-center gap-2 bg-primary text-on-primary px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]" data-icon="school">school</span>
                    Materia
                </button>
<button class="flex items-center gap-2 bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="flag">flag</span>
                    Estado
                </button>
<button class="flex items-center gap-2 bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="priority_high">priority_high</span>
                    Prioridad
                </button>
</div>
</div>
<!-- Task List Section -->
<div class="mt-8 space-y-8">
<h2 class="text-2xl font-bold text-on-surface font-headline tracking-tight">Próximas Tareas</h2>
<div id="tasks-list" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
    <!-- Tareas cargaradas dinámicamente aquí -->
    <p class="text-center text-on-surface-variant col-span-full">Cargando tareas...</p>
</div>
</div>
<!-- Bento Grid for Stats (Editorial Touch) -->
<div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="bg-primary-container/10 p-6 rounded-2xl flex flex-col justify-between border border-primary/5 min-h-[160px]">
<span class="text-primary font-bold text-sm tracking-widest uppercase">Progreso Semanal</span>
<div class="mt-4">
<div class="flex justify-between items-end mb-2">
<span class="text-3xl font-extrabold text-primary font-headline">75%</span>
<span class="text-xs text-primary/70 font-medium">12/16 tareas completadas</span>
</div>
<div class="w-full h-3 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-surface-tint w-3/4"></div>
</div>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-2xl border border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="bg-white p-3 rounded-xl shadow-sm">
<span class="material-symbols-outlined text-primary" data-icon="lightbulb">lightbulb</span>
</div>
<div>
<h4 class="font-bold text-on-surface font-headline">Tip de Estudio</h4>
<p class="text-xs text-on-surface-variant font-body mt-1">Pomodoro: Trabaja 25 min, descansa 5. ¡Aumenta tu enfoque en Cálculo!</p>
</div>
</div>
</div>
</div>
</main>
<!-- Floating Action Button -->
<button id="add-task-fab" class="fixed bottom-24 right-6 w-14 h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-2xl shadow-[0_12px_32px_-4px_rgba(53,37,205,0.3)] flex items-center justify-center transition-transform active:scale-95 z-50">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
<!-- Task Creation Modal -->
<div id="task-modal" class="hidden fixed inset-0 bg-surface/80 backdrop-blur-sm z-50 flex items-center justify-center px-4 transition-all">
    <div class="bg-surface-container-lowest w-full max-w-md p-6 rounded-3xl shadow-xl relative mt-[-10%] sm:mt-0 max-h-[90vh] overflow-y-auto">
        <button id="close-task-modal" class="absolute top-4 right-4 p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full">
            <span class="material-symbols-outlined text-lg">close</span>
        </button>
        <h3 class="font-headline font-bold text-xl text-on-surface mb-6">Nueva Tarea</h3>
        <form id="task-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-on-surface-variant mb-1">Título</label>
                <input id="task-title" required class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20" type="text" placeholder="Ej. Ejercicios Matemáticas"/>
            </div>
            <div>
                <label class="block text-sm font-semibold text-on-surface-variant mb-1">Descripción (opcional)</label>
                <textarea id="task-desc" class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20" rows="2" placeholder="Detalles de la tarea..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Fecha de Entrega</label>
                    <input id="task-date" required class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20" type="datetime-local"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Prioridad</label>
                    <select id="task-priority" class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-on-surface-variant mb-1">Materia</label>
                <select id="task-materia" class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20">
                    <option value="">Sin materia</option>
                </select>
            </div>
            <button id="save-task-submit" type="submit" class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold rounded-xl mt-4 shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all">
                Guardar Tarea
            </button>
        </form>
    </div>
</div>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#f9f9ff]/60 dark:bg-slate-900/60 backdrop-blur-xl border-t border-[#c7c4d8]/15 shadow-[0_-12px_32px_-4px_rgba(30,41,59,0.06)] rounded-t-2xl">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#3525cd] dark:hover:text-[#4f46e5] duration-150 active:scale-95" href="./dashboard.html">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[10px] font-medium">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#4f46e5] text-white rounded-2xl p-2 scale-110 transition-transform active:scale-95" href="./tareas.html">
<span class="material-symbols-outlined mb-1" data-icon="assignment">assignment</span>
<span class="font-['Inter'] text-[10px] font-medium">Tasks</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#3525cd] dark:hover:text-[#4f46e5] duration-150 active:scale-95" href="./calendario.html">
<span class="material-symbols-outlined mb-1" data-icon="calendar_month">calendar_month</span>
<span class="font-['Inter'] text-[10px] font-medium">Calendar</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#3525cd] dark:hover:text-[#4f46e5] duration-150 active:scale-95" href="./materias.html">
<span class="material-symbols-outlined mb-1" data-icon="category">category</span>
<span class="font-['Inter'] text-[10px] font-medium">Subjects</span>
</a>
</nav>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/api.js"></script>
<script src="./js/tareas.js"></script>
<script src="./js/pwa-setup.js"></script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body></html>
