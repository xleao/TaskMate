<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="../img/logo.jpg"/>
<link rel="icon" type="image/jpeg" href="../img/logo.jpg"/>
<link rel="manifest" href="./manifest.json"/>
<title>TaskMate - Bienvenido</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#3525cd">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed": "#c9e6ff",
              "surface-dim": "#cfdaf2",
              "on-surface-variant": "#464555",
              "on-secondary-fixed-variant": "#444749",
              "tertiary-container": "#006693",
              "primary-fixed-dim": "#c3c0ff",
              "secondary-fixed": "#e0e3e5",
              "on-primary-fixed-variant": "#3323cc",
              "on-secondary-fixed": "#191c1e",
              "on-secondary-container": "#626567",
              "inverse-primary": "#c3c0ff",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#b8e0ff",
              "primary": "#3525cd",
              "on-error-container": "#93000a",
              "surface-bright": "#f9f9ff",
              "surface-container-high": "#dee8ff",
              "tertiary-fixed-dim": "#89ceff",
              "secondary-fixed-dim": "#c4c7c9",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "surface-tint": "#4d44e3",
              "on-surface": "#111c2d",
              "error": "#ba1a1a",
              "secondary": "#5c5f61",
              "tertiary": "#004d70",
              "on-background": "#111c2d",
              "on-primary": "#ffffff",
              "outline": "#777587",
              "surface-variant": "#d8e3fb",
              "outline-variant": "#c7c4d8",
              "surface": "#f9f9ff",
              "on-error": "#ffffff",
              "surface-container-highest": "#d8e3fb",
              "inverse-surface": "#263143",
              "primary-container": "#4f46e5",
              "primary-fixed": "#e2dfff",
              "background": "#f9f9ff",
              "secondary-container": "#e0e3e5",
              "on-primary-fixed": "#0f0069",
              "on-tertiary-fixed": "#001e2f",
              "surface-container": "#e7eeff",
              "surface-container-low": "#f0f3ff",
              "on-primary-container": "#dad7ff",
              "inverse-on-surface": "#ecf1ff",
              "on-tertiary-fixed-variant": "#004c6e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-glass {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(12px);
      }
    </style>
<style>
    body {
      min-height: 100dvh;
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }
    html {
      overflow-x: hidden;
      width: 100%;
    }
</style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Brand Identity / Logo Section -->
<header class="mb-12 text-center">
<div class="flex items-center justify-center mb-6">
<div class="bg-gradient-to-br from-primary to-primary-container w-16 h-16 rounded-xl flex items-center justify-center shadow-[0_12px_32px_-4px_rgba(53,37,205,0.2)]">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="task_alt">task_alt</span>
</div>
</div>
<h1 id="form-title" class="font-headline font-extrabold text-3xl tracking-tight text-on-surface mb-2">TaskMate</h1>
<p id="form-subtitle" class="font-body text-on-surface-variant text-lg">Inicia sesión en tu cuenta</p>
</header>
<!-- Main Content Card (The "Work Zone") -->
<main class="w-full space-y-8 bg-surface-container-low p-8 rounded-xl relative overflow-hidden">
<!-- Asymmetric Accent -->
<div class="absolute -top-12 -right-12 w-24 h-24 bg-tertiary-fixed-dim/20 rounded-full blur-3xl"></div>
<form id="login-form-local" class="space-y-6 relative z-10">
    <div class="space-y-2">
        <label class="font-label text-sm font-semibold text-on-surface ml-1" for="username">Usuario</label>
        <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
            <input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 font-body transition-all duration-200" id="username" placeholder="Tu nombre de usuario" type="text" autocomplete="off" required/>
        </div>
    </div>
    <div class="space-y-2">
        <label class="font-label text-sm font-semibold text-on-surface ml-1" for="password">Contraseña</label>
        <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
            <input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 font-body transition-all duration-200" id="password" placeholder="••••••••" type="password" required/>
        </div>
    </div>
    <!-- Action Button -->
    <button id="submit-login-btn" class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-lg shadow-[0_12px_32px_-4px_rgba(53,37,205,0.15)] hover:shadow-[0_16px_40px_-4px_rgba(53,37,205,0.25)] active:scale-[0.98] transition-all duration-200" type="submit">
        Ingresar
    </button>
</form>
</main>
</div>
<!-- Background Decorative Element (Tonal Depth) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary-fixed-dim blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-tertiary-fixed blur-[120px] rounded-full"></div>
</div>
<!-- Install App Bottom Alert -->
<div id="pwa-install-banner" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-surface-container-highest rounded-2xl p-5 shadow-[0_20px_40px_-10px_rgba(53,37,205,0.2)] z-[100] border border-outline-variant/20 flex-col gap-4 animate-[slideUp_0.4s_ease-out]">
  <style>
    @keyframes slideUp {
      from { transform: translate(-50%, 150%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
  </style>
  <div class="flex items-start justify-between">
    <div class="flex items-center gap-4">
      <div class="bg-gradient-to-br from-primary to-primary-container w-12 h-12 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-primary/20">
         <span class="material-symbols-outlined text-white text-2xl" data-icon="task_alt">task_alt</span>
      </div>
      <div>
        <h3 class="font-headline font-bold text-on-surface text-lg leading-tight">Instalar App</h3>
        <p id="pwa-install-desc" class="text-xs text-on-surface-variant mt-1 leading-snug font-medium">Añádela a tu inicio para una experiencia nativa y más rápida.</p>
      </div>
    </div>
    <button id="pwa-close-btn" class="text-on-surface-variant hover:bg-surface-variant p-2 rounded-full transition-colors flex items-center justify-center">
      <span class="material-symbols-outlined text-xl">close</span>
    </button>
  </div>
  <button id="pwa-install-action" class="w-full bg-primary text-on-primary font-bold py-3.5 rounded-xl active:scale-95 transition-transform flex justify-center items-center shadow-md shadow-primary/20">
    Agregar a Pantalla de Inicio
  </button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/pwa-setup.js"></script>
<script>
  // Verificar si ya está logueado al cargar login.html
  window.addEventListener('load', () => {
    if (typeof checkUser === 'function') {
      checkUser('login');
    }
  });
</script>
</div>
</body></html>
