<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
    }
    body {
      min-height: 100dvh;
    }
    /* iOS Safe Area Support */
    .safe-top {
      padding-top: env(safe-area-inset-top, 0px);

<body class="bg-surface text-on-surface min-h-screen" style="padding-bottom: calc(5.5rem + env(safe-area-inset-bottom, 0px))">
<!-- TopAppBar -->
<header class="bg-[#f9f9ff] dark:bg-slate-950 border-b border-outline-variant/10 w-full top-0 z-40 sticky safe-top">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high flex items-center justify-center">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="professional portrait of a young male student in a minimal studio setting with soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC29nSYUsXTEJslhOpY0zdn1mTTwgfs7j4BGnKzylDTPP2NYaJzAKPQWHZ2unPYYZVB9uRzRr9Z-_7FQ-c7ukAPSgLXYt9zFtC0w8twlS-TXVvwrcAmLJjgXPvO3S6-Byw0l0bMGK9D2r8wyLJQ_-em9FtMQBU8I7eDjNCiVAFYURvCnacjDLxapEGm3Y7h3fIIlb753629JJbhOhVv022hM09BZDYxFMXbodGl5SiYvucctiPu-AI5R12FH0eVtk8g5rHUTuAd7cMb"/>
</div>
<span class="text-xl font-extrabold text-[#3525cd] dark:text-[#4f46e5] font-['Manrope']">TaskMate</span>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-200">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="search">search</span>
</button>
<button onclick="logout()" class="p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors duration-200" title="Cerrar sesión">
<span class="material-symbols-outlined text-red-500">logout</span>
</button>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto px-6 pt-4">
<!-- Search & Filters -->
<div class="relative space-y-4 z-40">
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input id="search-tasks-input" class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-12 focus:ring-2 focus:ring-primary/20 transition-all font-body text-on-surface placeholder:text-outline" placeholder="Buscar tareas..." type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<button id="clear-filters-btn" class="text-primary p-1 hidden" title="Limpiar filtros">
<span class="material-symbols-outlined">filter_alt_off</span>
</button>
</div>
</div>
<!-- Filter Chips -->
<div class="relative -mx-6 px-6 mt-4" style="z-index: 100;">
    <div class="flex gap-3 overflow-x-auto no-scrollbar scroll-smooth pt-2 pb-[160px] -mb-[160px] items-center">
        <!-- Materia Filter -->
        <div class="relative filter-dropdown-wrapper shrink-0">
            <button id="filter-materia-btn" class="filter-chip flex items-center gap-2 bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap hover:bg-surface-container-highest transition-colors active:scale-95">
                <span class="material-symbols-outlined text-[18px]">school</span>
                Materia
                <span class="material-symbols-outlined text-[14px] ml-0.5">expand_more</span>
            </button>
            <div id="filter-materia-dropdown" class="hidden absolute top-full left-0 mt-2 bg-surface-container-lowest rounded-xl border border-outline-variant/15 min-w-[200px] overflow-hidden" style="z-index: 9998; box-shadow: 0 12px 40px rgba(0,0,0,0.18);">
                <div id="filter-materia-options" class="max-h-48 overflow-y-auto py-2">
                    <button data-value="" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-on-surface hover:bg-surface-container-high transition-colors">Todas</button>
                </div>
            </div>
        </div>
        <!-- Estado Filter -->
        <div class="relative filter-dropdown-wrapper shrink-0">
            <button id="filter-estado-btn" class="filter-chip flex items-center gap-2 bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap hover:bg-surface-container-highest transition-colors active:scale-95">
                <span class="material-symbols-outlined text-[18px]">flag</span>
                Estado
                <span class="material-symbols-outlined text-[14px] ml-0.5">expand_more</span>
            </button>
            <div id="filter-estado-dropdown" class="hidden absolute top-full left-0 mt-2 bg-surface-container-lowest rounded-xl border border-outline-variant/15 min-w-[180px] overflow-hidden" style="z-index: 9998; box-shadow: 0 12px 40px rgba(0,0,0,0.18);">
                <div class="py-2">
                    <button data-value="" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-on-surface hover:bg-surface-container-high transition-colors">Todos</button>
                    <button data-value="pendiente" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-on-surface hover:bg-surface-container-high transition-colors">⏳ Pendiente</button>
                    <button data-value="en_progreso" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-on-surface hover:bg-surface-container-high transition-colors">🔄 En Progreso</button>
                    <button data-value="completada" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-on-surface hover:bg-surface-container-high transition-colors">✅ Completada</button>
                    <button data-value="vencida" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-on-surface hover:bg-surface-container-high transition-colors">❌ Vencida</button>
                </div>
            </div>
        </div>
        <!-- Prioridad Filter -->
        <div class="relative filter-dropdown-wrapper shrink-0">
            <button id="filter-prioridad-btn" class="filter-chip flex items-center gap-2 bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap hover:bg-surface-container-highest transition-colors active:scale-95">
                <span class="material-symbols-outlined text-[18px]">priority_high</span>
                Prioridad
                <span class="material-symbols-outlined text-[14px] ml-0.5">expand_more</span>
            </button>
            <div id="filter-prioridad-dropdown" class="hidden absolute top-full left-0 mt-2 bg-surface-container-lowest rounded-xl border border-outline-variant/15 min-w-[160px] overflow-hidden" style="z-index: 9998; box-shadow: 0 12px 40px rgba(0,0,0,0.18);">
                <div class="py-2">
                    <button data-value="" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-on-surface hover:bg-surface-container-high transition-colors">Todas</button>
                    <button data-value="alta" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-error hover:bg-surface-container-high transition-colors">🔴 Alta</button>
                    <button data-value="media" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-yellow-600 hover:bg-surface-container-high transition-colors">🟡 Media</button>
                    <button data-value="baja" class="filter-option w-full text-left px-4 py-3 text-sm font-medium text-emerald-600 hover:bg-surface-container-high transition-colors">🟢 Baja</button>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
<!-- Task List Section -->
<div class="mt-8 space-y-8">
<h2 class="text-2xl font-bold text-on-surface font-headline tracking-tight">Próximas Tareas</h2>
<div id="tasks-list" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
    <!-- Tareas cargaradas dinámicamente aquí -->
    <p class="text-center text-on-surface-variant col-span-full">Cargando tareas...</p>
</div>
</div>
<!-- Bento Grid for Stats (Editorial Touch) -->
<div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
<div class="bg-primary-container/10 p-6 rounded-2xl flex flex-col justify-between border border-primary/5 min-h-[160px]">
<span class="text-primary font-bold text-sm tracking-widest uppercase">Progreso Semanal</span>
<div class="mt-4">
<div class="flex justify-between items-end mb-2">
<span id="progress-percent" class="text-3xl font-extrabold text-primary font-headline">--%</span>
<span id="progress-count" class="text-xs text-primary/70 font-medium">Calculando...</span>
</div>
<div class="w-full h-3 bg-surface-container-highest rounded-full overflow-hidden">
<div id="progress-bar" class="h-full bg-gradient-to-r from-primary to-surface-tint transition-all duration-500" style="width: 0%"></div>
</div>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-2xl border border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="bg-white p-3 rounded-xl shadow-sm">
<span class="material-symbols-outlined text-primary" data-icon="lightbulb">lightbulb</span>
</div>
<div>
<h4 class="font-bold text-on-surface font-headline">Tip de Estudio</h4>
<p class="text-xs text-on-surface-variant font-body mt-1">Pomodoro: Trabaja 25 min, descansa 5. ¡Aumenta tu enfoque en Cálculo!</p>
</div>
</div>
</div>
</div>
</main>
<!-- Floating Action Button -->
<button id="add-task-fab" class="fixed right-6 w-16 h-16 bg-gradient-to-br from-primary to-primary-container text-white rounded-2xl flex items-center justify-center transition-transform active:scale-95" style="bottom: calc(5rem + env(safe-area-inset-bottom, 0px)); z-index: 9999; box-shadow: 0 8px 24px rgba(53,37,205,0.4);">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
<!-- Task Creation Modal -->
<div id="task-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[11000] flex items-center justify-center p-4 transition-all">
    <div class="bg-surface-container-lowest w-full max-w-md rounded-[2.5rem] shadow-2xl relative max-h-[92vh] flex flex-col overflow-hidden animate-[modalScaleIn_0.3s_ease-out]">
        <!-- Header -->
        <div class="px-8 pt-8 pb-4 flex justify-between items-center">
            <h3 class="font-headline font-extrabold text-2xl text-on-surface tracking-tight">Nueva Tarea</h3>
            <button id="close-task-modal" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-slate-100 rounded-full transition-colors">
                <span class="material-symbols-outlined text-[24px]">close</span>
            </button>
        </div>
        <div class="overflow-y-auto px-8 pb-8 space-y-6">
        <form id="task-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-on-surface-variant mb-1">Título</label>
                <input id="task-title" required class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20" type="text" placeholder="Ej. Ejercicios Matemáticas"/>
            </div>
            <div>
                <label class="block text-sm font-semibold text-on-surface-variant mb-1">Descripción (opcional)</label>
                <textarea id="task-desc" class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20" rows="2" placeholder="Detalles de la tarea..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Fecha de Entrega</label>
                    <input id="task-date" required class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20" type="datetime-local"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Prioridad</label>
                    <select id="task-priority" class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-on-surface-variant mb-1">Materia</label>
                <select id="task-materia" class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20">
                    <option value="">Sin materia</option>
                </select>
            </div>
            <button id="save-task-submit" type="submit" class="w-full py-5 bg-gradient-to-r from-[#3525cd] to-[#4f46e5] text-white font-headline font-extrabold rounded-2xl mt-4 shadow-[0_12px_24px_-4px_rgba(53,37,205,0.25)] active:scale-[0.98] transition-all">
                Guardar Tarea
            </button>
        </form>
    </div>
</div>

<!-- Task Detail/Edit Modal -->
<div id="task-detail-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 transition-all" style="z-index: 10000;">
    <div class="bg-surface-container-lowest w-full max-w-md rounded-[2.5rem] shadow-2xl relative max-h-[92vh] flex flex-col overflow-hidden animate-[modalScaleIn_0.3s_ease-out]">
        <style>
            @keyframes modalScaleIn {
                from { opacity: 0; transform: scale(0.95) translateY(20px); }
                to { opacity: 1; transform: scale(1) translateY(0); }
            }
        </style>
        <!-- Header -->
        <div class="sticky top-0 bg-surface-container-lowest px-8 pt-8 pb-4 flex justify-between items-center">
            <h3 id="detail-modal-title" class="font-headline font-extrabold text-2xl text-on-surface tracking-tight">Detalle de Tarea</h3>
            <button id="close-detail-modal" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-slate-100 rounded-full transition-colors">
                <span class="material-symbols-outlined text-[24px]">close</span>
            </button>
        </div>
        <div class="overflow-y-auto px-8 pb-8 space-y-6 flex-1">
            <!-- Estado Chips -->
            <div>
                <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-3">Estado</label>
                <div id="detail-estado-chips" class="flex flex-wrap gap-2">
                    <button data-estado="pendiente" class="estado-chip px-4 py-2 rounded-full text-sm font-semibold transition-all">⏳ Pendiente</button>
                    <button data-estado="en_progreso" class="estado-chip px-4 py-2 rounded-full text-sm font-semibold transition-all">🔄 En Progreso</button>
                    <button data-estado="completada" class="estado-chip px-4 py-2 rounded-full text-sm font-semibold transition-all">✅ Completada</button>
                </div>
            </div>
            <!-- Edit Form -->
            <form id="edit-task-form" class="space-y-4">
                <input type="hidden" id="edit-task-id"/>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Título</label>
                    <input id="edit-task-title" required class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20" type="text"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Descripción</label>
                    <textarea id="edit-task-desc" class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20" rows="2"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-on-surface-variant mb-1">Fecha</label>
                        <input id="edit-task-date" required class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20" type="datetime-local"/>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-on-surface-variant mb-1">Prioridad</label>
                        <select id="edit-task-priority" class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20">
                            <option value="baja">Baja</option>
                            <option value="media">Media</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Materia</label>
                    <select id="edit-task-materia" class="w-full bg-surface-container border-none rounded-2xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20">
                        <option value="">Sin materia</option>
                    </select>
                </div>
                <!-- Action Buttons -->
                <div class="flex flex-col gap-3 pt-6">
                    <button type="submit" id="save-edit-btn" class="w-full py-5 bg-gradient-to-r from-[#3525cd] to-[#4f46e5] text-white font-headline font-extrabold rounded-2xl shadow-[0_12px_24px_-4px_rgba(53,37,205,0.25)] active:scale-[0.98] transition-all">
                        Guardar Cambios
                    </button>
                    <button type="button" id="delete-task-detail-btn" class="w-full py-4 bg-red-50 text-red-600 font-bold rounded-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 border border-red-100/50 hover:bg-red-100/20">
                        <span class="material-symbols-outlined text-[20px]">delete</span>
                        Eliminar Tarea
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-[11000] flex justify-around items-center px-4 pt-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border-t border-outline-variant/15 shadow-[0_-12px_40px_-4px_rgba(0,0,0,0.1)]">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#3525cd] transition-colors active:scale-95" href="./dashboard.html">
<span class="material-symbols-outlined mb-0.5" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[10px] font-medium">Inicio</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#4f46e5] text-white rounded-2xl p-2 px-3 scale-110 shadow-lg shadow-primary/20 transition-all font-bold" href="./tareas.html">
<span class="material-symbols-outlined mb-0.5" data-icon="assignment" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-['Inter'] text-[10px]">Tareas</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#3525cd] transition-colors active:scale-95" href="./calendario.html">
<span class="material-symbols-outlined mb-0.5" data-icon="calendar_month">calendar_month</span>
<span class="font-['Inter'] text-[10px] font-medium">Calendario</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#3525cd] transition-colors active:scale-95" href="./materias.html">
<span class="material-symbols-outlined mb-0.5" data-icon="category">category</span>
<span class="font-['Inter'] text-[10px] font-medium">Materias</span>
</a>
</nav>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
